<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Property Report Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow" id="report-type">Interactive property report template</div>
      <h1 id="hero-title">Property Address Placeholder</h1>
      <p id="hero-summary">Replace this executive one-liner with the new property's positioning story.</p>
      <div class="hero-footer">
        <div class="meta" id="hero-meta"></div>
        <div class="contact-card" id="contact-card"></div>
      </div>
    </section>

    <div class="disclaimer" id="disclaimer"></div>

    <div class="layout">
      <aside class="sidebar" id="mobileSidebar">
        <button class="mobile-nav-toggle" id="mobileNavToggle">Sections <span id="mobileNavLabel">Show</span></button>
        <h3 class="sidebar-title">Sections</h3>
        <div class="tablist" id="tablist"></div>
      </aside>

      <main class="content" id="content"></main>
    </div>
  </div>

  <script src="./data/property-template.js"></script>
  <script src="./app.js"></script>
</body>
</html>
